<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sortd Feature Graphic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #111;
  }

  .banner {
    width: 1024px;
    height: 500px;
    background: linear-gradient(135deg, #1A1625 0%, #2D1B4E 50%, #1A1625 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Subtle radial glow behind the logo area */
  .banner::before {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
  }

  .content {
    display: flex;
    align-items: center;
    gap: 60px;
    position: relative;
    z-index: 1;
  }

  /* Sortd stacked blocks logo */
  .logo {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }

  .logo-row {
    display: flex;
    gap: 8px;
  }

  .block {
    height: 28px;
    border-radius: 8px;
  }

  /* Row 1 */
  .block-pink   { width: 100px; background: #EC4899; }
  .block-purple  { width: 44px;  background: #7C3AED; }

  /* Row 2 */
  .block-orange  { width: 44px;  background: #F59E0B; }
  .block-violet  { width: 100px; background: #8B5CF6; }

  /* Row 3 */
  .block-green   { width: 120px; background: #34D399; }
  .block-brown   { width: 24px;  background: #92702A; }

  .text-area {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .app-name {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 72px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: -2px;
    line-height: 1;
  }

  .app-name .dot {
    color: #7C3AED;
  }

  .tagline {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 0.5px;
    max-width: 440px;
    line-height: 1.4;
  }

  /* Decorative floating blocks in background */
  .deco {
    position: absolute;
    border-radius: 6px;
    opacity: 0.08;
  }

  .deco-1 { width: 80px; height: 20px; background: #EC4899; top: 60px; left: 80px; transform: rotate(-8deg); }
  .deco-2 { width: 50px; height: 20px; background: #7C3AED; top: 120px; right: 100px; transform: rotate(5deg); }
  .deco-3 { width: 110px; height: 20px; background: #34D399; bottom: 80px; left: 120px; transform: rotate(3deg); }
  .deco-4 { width: 40px; height: 20px; background: #F59E0B; bottom: 140px; right: 150px; transform: rotate(-6deg); }
  .deco-5 { width: 70px; height: 20px; background: #8B5CF6; top: 200px; left: 40px; transform: rotate(10deg); }
  .deco-6 { width: 60px; height: 20px; background: #EC4899; bottom: 50px; right: 60px; transform: rotate(-3deg); }
  .deco-7 { width: 90px; height: 20px; background: #7C3AED; top: 40px; right: 250px; transform: rotate(7deg); }
  .deco-8 { width: 45px; height: 20px; background: #34D399; top: 300px; right: 40px; transform: rotate(-12deg); }
</style>
</head>
<body>
  <div class="banner">
    <!-- Decorative background blocks -->
    <div class="deco deco-1"></div>
    <div class="deco deco-2"></div>
    <div class="deco deco-3"></div>
    <div class="deco deco-4"></div>
    <div class="deco deco-5"></div>
    <div class="deco deco-6"></div>
    <div class="deco deco-7"></div>
    <div class="deco deco-8"></div>

    <div class="content">
      <!-- Stacked blocks logo -->
      <div class="logo">
        <div class="logo-row">
          <div class="block block-pink"></div>
          <div class="block block-purple"></div>
        </div>
        <div class="logo-row">
          <div class="block block-orange"></div>
          <div class="block block-violet"></div>
        </div>
        <div class="logo-row">
          <div class="block block-green"></div>
          <div class="block block-brown"></div>
        </div>
      </div>

      <!-- Text -->
      <div class="text-area">
        <div class="app-name">sortd<span class="dot">.</span></div>
        <div class="tagline">Smart task scheduling that fills your calendar intelligently</div>
      </div>
    </div>
  </div>
</body>
</html>
